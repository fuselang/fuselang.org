<section class="install" id="install">
  <h2>Install Fuse</h2>
  <p>Get the Fuse toolchain on Linux (x86_64) or macOS (ARM64).</p>
  <div class="install-command-wrapper">
    <code class="install-command">curl -fsSL https://fuselang.github.io/fuse/fuseup | sh</code>
    <button class="copy-btn" onclick="navigator.clipboard.writeText('curl -fsSL https://fuselang.github.io/fuse/fuseup | sh');this.querySelector('.icon-copy').style.display='none';this.querySelector('.icon-check').style.display='inline';setTimeout(()=>{this.querySelector('.icon-copy').style.display='inline';this.querySelector('.icon-check').style.display='none'},1500)" aria-label="Copy to clipboard">
      <svg class="icon-copy" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      <svg class="icon-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="20 6 9 17 4 12"/></svg>
    </button>
  </div>
</section>
