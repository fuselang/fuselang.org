<header class="site-header">
  <div class="header-inner">
    {{ if not .IsHome }}
      {{ $logo := (resources.Get "fuse-icon.png").Resize "80x" }}
      <a href="{{ .Site.BaseURL }}" class="site-logo">
        <img src="{{ $logo.RelPermalink }}" alt="Fuse" width="{{ $logo.Width }}" height="{{ $logo.Height }}">
        <span>fuse</span>
      </a>
    {{ end }}
    <button class="nav-toggle" onclick="this.nextElementSibling.classList.toggle('nav-open')" aria-label="Toggle navigation">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 12h18M3 6h18M3 18h18"/>
      </svg>
    </button>
    <nav>
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}"{{ if hasPrefix .URL "https" }} target="_blank" rel="noopener"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
